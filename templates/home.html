<!DOCTYPE html>
<html>
<head>
    <title>FWI Prediction</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            margin:0;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:15px;
            width:500px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#1e3c72;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#1e3c72;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#2a5298;
        }

        .result{
            margin-top:20px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
            color:green;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🔥 Forest Fire Weather Index Prediction</h1>

    <form action="{{ url_for('prediction') }}" method="post">

        <input type="text" name="Temperature" placeholder="Temperature" required>

        <input type="text" name="RH" placeholder="Relative Humidity (RH)" required>

        <input type="text" name="Ws" placeholder="Wind Speed (Ws)" required>

        <input type="text" name="Rain" placeholder="Rain" required>

        <input type="text" name="FFMC" placeholder="FFMC" required>

        <input type="text" name="DMC" placeholder="DMC" required>

        <input type="text" name="ISI" placeholder="ISI" required>

        <input type="text" name="Classes" placeholder="Classes" required>

        <input type="text" name="Region" placeholder="Region" required>

        <button type="submit">Predict FWI</button>

    </form>

    <div class="result">
        {{ results }}
    </div>

</div>

</body>
</html>
